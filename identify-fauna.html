<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eureka | Identify Fauna</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/app-logo.png">
  <style>
    /* Fauna themed background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: url('assets/fauna-bg.png') center center / cover no-repeat;
      opacity: 0.10;
      mix-blend-mode: luminosity;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(200,120,10,0.07) 0%, transparent 70%),
        linear-gradient(to bottom, rgba(8,15,10,0.55) 0%, transparent 40%, transparent 60%, rgba(8,15,10,0.55) 100%);
    }

    /* Fauna amber accent overrides */
    .page-tag {
      background: rgba(232,168,48,0.1);
      color: #e8a830;
      border: 1px solid rgba(232,168,48,0.22);
    }
    .input-card:hover {
      border-color: #e8a830;
      box-shadow: 0 8px 24px rgba(232,168,48,0.10);
    }
    .btn-primary {
      background: linear-gradient(135deg, #c8780a, #e8a830) !important;
      color: #0a0600 !important;
      box-shadow: 0 4px 20px rgba(232,168,48,0.22) !important;
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 8px 32px rgba(232,168,48,0.38) !important;
    }
    .result-box {
      border-color: rgba(232,168,48,0.22) !important;
    }
    .result-box::before {
      background: linear-gradient(90deg, transparent, #e8a830, transparent) !important;
    }
    .result-label { color: #e8a830 !important; }
    .result-location { color: #e8a830 !important; }

    /* Fix card transparency bleed-through on scroll */
    .input-card {
      background: rgba(15, 10, 4, 0.82) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .preview-wrapper {
      background: rgba(15, 10, 4, 0.82) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .result-box {
      background: rgba(15, 10, 4, 0.82) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
    }
    .btn-primary {
      backdrop-filter: blur(8px) !important;
      -webkit-backdrop-filter: blur(8px) !important;
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <img src="assets/app-logo.png" alt="Eureka" style="width:46px;height:46px;">
    <div class="user-info">
      <strong id="userName">Guest</strong>
      <span id="userEmail">Not signed in</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="/">🏠 &nbsp;Home</a>
    <a href="/identify-flora">🌿 &nbsp;Identify Flora</a>
    <a href="/identify-fauna" class="active">🐾 &nbsp;Identify Fauna</a>
    <a href="/history">📜 &nbsp;Field Log</a>
    <a href="/about">✦ &nbsp;About</a>
  </nav>
  <div class="sidebar-footer"><p>EUREKA v2.0 &nbsp;·&nbsp; Gemini AI</p></div>
</aside>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="navbar">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="logo">Eureka</span>
  <div style="width:44px;"></div>
</nav>

<main class="identify-container">
  <div class="page-header">
    <span class="page-tag">Zoological Analysis</span>
    <h1 style="font-size:clamp(1.8rem,5vw,2.8rem);">Identify Fauna</h1>
    <p class="page-desc">Photograph animals, birds, insects or reptiles for instant zoological classification.</p>
  </div>

  <div id="cameraContainer" style="display:none;position:relative;margin-bottom:16px;">
    <video id="video" width="100%" autoplay playsinline
      style="border-radius:var(--r-md);background:#000;box-shadow:var(--shadow-lg);"></video>
    <div style="position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;">
      <button class="btn-primary" onclick="takeSnapshot()"
              style="border-radius:50%;width:72px;height:72px;padding:0;font-size:26px;
                     border:3px solid rgba(232,168,48,0.6);">📸</button>
    </div>
  </div>

  <div class="input-options" id="inputOptions">
    <div class="input-card" onclick="startCamera()">
      <div class="input-card-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <span>Camera</span>
    </div>
    <label class="input-card">
      <div class="input-card-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <span>Upload</span>
      <input type="file" accept="image/*" hidden onchange="handleImage(this)">
    </label>
  </div>

  <div class="preview-wrapper" id="previewWrapper">
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="previewImage" class="preview-image" alt="Preview">
    <p id="previewHint" class="preview-hint">Select an image to begin identification</p>
    <button id="retakeBtn" class="btn-secondary"
            style="display:none;margin:14px auto 0;width:100%;" onclick="retakePhoto()">
      ↺ &nbsp;Change Photo
    </button>
  </div>

  <button class="btn-primary" id="analyzeBtn" disabled onclick="analyzeFauna()">
    Analyse Fauna Species
  </button>

  <div id="resultBox" class="result-box" style="display:none;"></div>
</main>

<script type="module">
import { auth, db } from "./firebase-init.js";
import { addDoc, collection, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let img64 = null, location = "Unknown", stream = null;
let userProfile = { fullName: "", username: "" };

onAuthStateChanged(auth, async u => {
  if (!u) { window.location.href = "/login.html"; return; }
  try {
    const snap = await getDoc(doc(db, "users", u.uid, "profile", "info"));
    if (snap.exists()) userProfile = snap.data();
    else userProfile = { fullName: u.displayName || u.email, username: u.email };
  } catch { userProfile = { fullName: u.displayName || u.email, username: u.email }; }
});

if (navigator.geolocation)
  navigator.geolocation.getCurrentPosition(
    p => { location = `${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`; },
    () => {}
  );

window.toggleSidebar = () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
};

window.startCamera = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" }, audio:false });
    document.getElementById("video").srcObject = stream;
    document.getElementById("cameraContainer").style.display = "block";
    document.getElementById("inputOptions").style.display = "none";
    document.getElementById("previewWrapper").style.display = "none";
  } catch { alert("Camera access denied."); }
};

window.takeSnapshot = () => {
  const v = document.getElementById("video"), c = document.getElementById("canvas");
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext("2d").drawImage(v,0,0);
  img64 = c.toDataURL("image/jpeg", 0.85);
  showPreview(img64);
  stream.getTracks().forEach(t=>t.stop());
  document.getElementById("cameraContainer").style.display = "none";
  document.getElementById("previewWrapper").style.display = "flex";
};

window.handleImage = input => {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    img64 = r.result; showPreview(r.result);
    document.getElementById("inputOptions").style.display = "none";
    document.getElementById("previewWrapper").style.display = "flex";
  };
  r.readAsDataURL(file);
};

function showPreview(src) {
  const img = document.getElementById("previewImage");
  img.src = src; img.style.display = "block";
  document.getElementById("previewHint").style.display = "none";
  document.getElementById("retakeBtn").style.display = "block";
  document.getElementById("analyzeBtn").disabled = false;
}

window.retakePhoto = () => {
  img64 = null;
  document.getElementById("previewImage").style.display = "none";
  document.getElementById("previewHint").style.display = "block";
  document.getElementById("retakeBtn").style.display = "none";
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("inputOptions").style.display = "grid";
  document.getElementById("resultBox").style.display = "none";
};

window.analyzeFauna = async () => {
  const user = auth.currentUser;
  if (!user) { window.location.href = "/login.html"; return; }
  const btn = document.getElementById("analyzeBtn");
  const box = document.getElementById("resultBox");
  btn.textContent = "Analysing…"; btn.disabled = true; box.style.display = "none";
  try {
    const res  = await fetch("/analyze/fauna", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ image:img64 }) });
    const data = await res.json();
    if (data.error) {
      box.style.display = "block";
      box.innerHTML = `<p style="color:#ff6b6b;">⚠ ${data.error}</p>`;
    } else {
      const r = data.result;
      const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
      box.style.display = "block";
      box.innerHTML = `
        <h3>${r.commonName}</h3>
        <div class="result-field"><span class="result-label">Scientific</span><span class="result-value"><em>${r.scientificName}</em></span></div>
        <div class="result-field"><span class="result-label">Class</span><span class="result-value">${r.class}</span></div>
        <div class="result-field"><span class="result-label">Habitat</span><span class="result-value">${r.habitat}</span></div>
        <div class="result-description">${r.description}</div>
        <a href="${mapUrl}" target="_blank" rel="noopener" class="result-location">📍 &nbsp;${location}</a>
      `;
      try {
        await addDoc(collection(db,"users",user.uid,"history"), {
          datetime: Date.now(), commonName:r.commonName, scientificName:r.scientificName,
          habitat:r.habitat, location, type:"fauna",
          username: userProfile.username || user.email,
          fullName: userProfile.fullName || user.displayName || user.email
        });
      } catch(e) { console.warn("Save failed:", e); }
    }
  } catch {
    box.style.display = "block";
    box.innerHTML = `<p style="color:#ff6b6b;">⚠ Could not reach the server. Please try again.</p>`;
  }
  btn.textContent = "Analyse Fauna Species"; btn.disabled = false;
};
</script>
</body>
</html>
